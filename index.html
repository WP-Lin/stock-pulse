<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockPulse — 股市監控</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  :root {
    --bg:#0a0e17; --bg2:#0f1520; --bg3:#141c2e;
    --border:#1e2d47; --accent:#00d4ff;
    --green:#00e676; --red:#ff3d5a;
    --text:#c8d8f0; --dim:#4a6080; --yellow:#ffd600;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; overflow:hidden; }
  ::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* ── Layout ── */
  .app { display:grid; grid-template-rows:54px 1fr 28px; grid-template-columns:220px 1fr; height:100vh; }

  /* ── Header ── */
  header {
    grid-column:1/-1;
    display:flex; align-items:center; gap:12px;
    padding:0 16px; background:var(--bg2); border-bottom:1px solid var(--border);
  }
  .logo { font-family:'Space Mono',monospace; font-size:15px; color:var(--accent); letter-spacing:2px; }
  .logo span { color:var(--dim); }

  .search-row { display:flex; gap:8px; align-items:center; }
  .sbox { display:flex; align-items:center; gap:7px; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:5px 11px; width:240px; transition:border-color .2s; }
  .sbox:focus-within { border-color:var(--accent); }
  .sbox input { background:none; border:none; outline:none; color:var(--text); font-family:'Space Mono',monospace; font-size:12px; width:100%; }
  .sbox input::placeholder { color:var(--dim); }

  .pill-btn { padding:4px 13px; border-radius:4px; border:1px solid var(--accent); background:rgba(0,212,255,.1); color:var(--accent); font-size:12px; cursor:pointer; font-family:'Space Mono',monospace; transition:all .2s; white-space:nowrap; }
  .pill-btn:hover { background:var(--accent); color:var(--bg); }
  .pill-btn.gray { border-color:var(--border); background:transparent; color:var(--dim); }
  .pill-btn.gray:hover { border-color:var(--dim); color:var(--text); }

  .hdr-right { display:flex; gap:10px; align-items:center; margin-left:auto; }
  .badge { padding:3px 9px; border-radius:10px; font-size:10px; font-family:'Space Mono',monospace; border:1px solid; white-space:nowrap; }
  .badge.us { color:#64b5f6; border-color:rgba(100,181,246,.3); background:rgba(100,181,246,.08); }
  .badge.tw { color:var(--green); border-color:rgba(0,230,118,.3); background:rgba(0,230,118,.08); }
  .live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #clock { font-family:'Space Mono',monospace; font-size:11px; color:var(--dim); }

  /* ── Watchlist sidebar ── */
  .sidebar {
    background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .sidebar-head {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 14px 6px; border-bottom:1px solid var(--border);
  }
  .sidebar-title { font-size:10px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }
  .icon-btn { background:none; border:none; color:var(--dim); cursor:pointer; font-size:12px; padding:2px 4px; border-radius:3px; transition:color .15s; }
  .icon-btn:hover { color:var(--red); }

  .wl-list { flex:1; overflow-y:auto; }
  .witem {
    padding:9px 14px; cursor:pointer; transition:background .15s;
    border-left:2px solid transparent; position:relative;
  }
  .witem:hover { background:var(--bg3); }
  .witem.active { background:var(--bg3); border-left-color:var(--accent); }
  .wi-row1 { display:flex; justify-content:space-between; align-items:center; }
  .wi-sym { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; }
  .wi-rm { opacity:0; font-size:11px; color:var(--dim); background:none; border:none; cursor:pointer; transition:all .15s; padding:0; }
  .witem:hover .wi-rm { opacity:1; }
  .wi-rm:hover { color:var(--red) !important; }
  .wi-name { font-size:10px; color:var(--dim); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wi-row2 { display:flex; justify-content:space-between; margin-top:4px; }
  .wi-price { font-family:'Space Mono',monospace; font-size:12px; }
  .wi-pct { font-size:10px; }
  .up { color:var(--green); } .dn { color:var(--red); }

  .wl-footer { padding:10px 14px; border-top:1px solid var(--border); }
  .add-hint { font-size:10px; color:var(--dim); line-height:1.6; }
  .add-hint code { background:var(--bg3); padding:1px 5px; border-radius:3px; color:var(--accent); font-size:10px; }

  /* ── Chart main area ── */
  .chart-main {
    display:flex; flex-direction:column; overflow:hidden; background:var(--bg);
  }

  /* Sym info bar */
  .sym-bar {
    display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--border);
    min-height:52px;
  }
  .sym-name-big { font-family:'Space Mono',monospace; font-size:18px; font-weight:700; color:var(--accent); }
  .sym-full { font-size:11px; color:var(--dim); }
  .sym-price { font-family:'Space Mono',monospace; font-size:22px; font-weight:700; }
  .sym-chg { font-family:'Space Mono',monospace; font-size:13px; }
  .sym-meta { display:flex; gap:14px; margin-left:auto; flex-wrap:wrap; }
  .sym-stat { text-align:right; }
  .sym-stat-l { font-size:9px; color:var(--dim); }
  .sym-stat-v { font-family:'Space Mono',monospace; font-size:11px; }

  /* Indicator controls */
  .ctrl-bar {
    display:flex; align-items:center; gap:6px; padding:6px 14px;
    background:var(--bg2); border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .ctrl-label { font-size:10px; color:var(--dim); margin-right:4px; }
  .ind-toggle {
    padding:3px 10px; border-radius:3px; border:1px solid var(--border);
    background:transparent; font-size:11px; cursor:pointer;
    font-family:'Space Mono',monospace; transition:all .15s; color:var(--dim);
  }
  .ind-toggle:hover { border-color:var(--text); color:var(--text); }
  .ind-toggle.on-vol { color:#64b5f6; border-color:#64b5f6; background:rgba(100,181,246,.08); }
  .ind-toggle.on-rsi { color:var(--yellow); border-color:var(--yellow); background:rgba(255,214,0,.08); }
  .ind-toggle.on-macd { color:#7b5ea7; border-color:#7b5ea7; background:rgba(123,94,167,.1); }
  .ctrl-sep { width:1px; height:18px; background:var(--border); margin:0 4px; }
  
  /* 另開官方圖表按鈕特效 */
  .external-btn {
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:5px;
    background:rgba(0, 212, 255, 0.1);
    border:1px solid var(--accent);
    color:var(--accent);
    border-radius:4px;
    padding:4px 12px;
    font-size:11px;
    font-family:'Space Mono',monospace;
    cursor:pointer;
    transition:all 0.2s;
  }
  .external-btn:hover { background:var(--accent); color:var(--bg); }

  /* TradingView widget container */
  .tv-wrap {
    flex:1; position:relative; background:#131722;
  }
  .tv-wrap iframe { display:block; }
  .tv-loading {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:var(--bg); gap:12px; z-index:2;
    transition:opacity .5s;
  }
  .tv-loading.hidden { opacity:0; pointer-events:none; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .load-txt { font-family:'Space Mono',monospace; font-size:12px; color:var(--dim); text-align:center; line-height:1.6; }

  /* ── Ticker bar ── */
  .ticker-bar {
    grid-column:1/-1;
    background:var(--bg2); border-top:1px solid var(--border);
    display:flex; align-items:center; overflow:hidden;
  }
  .ticker-inner { display:flex; gap:28px; animation:ticker 60s linear infinite; white-space:nowrap; padding-left:100%; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .titem { font-family:'Space Mono',monospace; font-size:11px; display:flex; gap:7px; align-items:center; }

  /* ── Toast ── */
  .toast { position:fixed; top:64px; right:16px; padding:8px 15px; border-radius:6px; font-size:12px; font-family:'Space Mono',monospace; z-index:200; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }
  .toast.ok { background:rgba(0,230,118,.15); border:1px solid rgba(0,230,118,.4); color:var(--green); }
  .toast.ng { background:rgba(255,61,90,.15); border:1px solid rgba(255,61,90,.4); color:var(--red); }

  /* ── Modal / help overlay ── */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-bg.show { opacity:1; pointer-events:all; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:28px; max-width:460px; width:90%; }
  .modal h3 { font-size:15px; color:var(--accent); margin-bottom:16px; font-family:'Space Mono',monospace; }
  .modal p { font-size:12px; color:var(--dim); line-height:1.8; margin-bottom:12px; }
  .sym-table { width:100%; border-collapse:collapse; margin-bottom:16px; }
  .sym-table th { font-size:10px; color:var(--dim); text-align:left; padding:4px 8px; border-bottom:1px solid var(--border); }
  .sym-table td { font-size:11px; padding:5px 8px; border-bottom:1px solid rgba(30,45,71,.5); font-family:'Space Mono',monospace; }
  .sym-table td:first-child { color:var(--accent); }
</style>
</head>
<body>

<div class="app">
  <!-- ═══ HEADER ═══ -->
  <header>
    <div class="logo">STOCK<span>PULSE</span></div>
    <div class="search-row">
      <div class="sbox">
        <svg width="13" height="13" fill="none" stroke="#4a6080" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" placeholder="代碼 如 2330 / AAPL" />
      </div>
      <button class="pill-btn" onclick="addFromSearch()">+ 加入</button>
      <button class="pill-btn gray" onclick="showHelp()">？ 說明</button>
    </div>
    <div class="hdr-right">
      <span class="badge us">🇺🇸 美股</span>
      <span class="badge tw">🇹🇼 台股</span>
      <div class="live-dot"></div>
      <span style="font-size:11px;color:var(--green);font-family:'Space Mono',monospace">即時報價</span>
      <span id="clock"></span>
    </div>
  </header>

  <!-- ═══ WATCHLIST ═══ -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">自選清單</span>
      <button class="icon-btn" onclick="clearAll()" title="清空">✕</button>
    </div>
    <div class="wl-list" id="wlList"></div>
    <div class="wl-footer">
      <div class="add-hint">
        支援純數字輸入<br>
        例：<code>2330</code> 會自動轉換
      </div>
    </div>
  </aside>

  <!-- ═══ MAIN CHART ═══ -->
  <div class="chart-main">
    <div class="sym-bar" id="symBar">
      <div>
        <div class="sym-name-big" id="symBig">--</div>
        <div class="sym-full" id="symFull">請選擇股票</div>
      </div>
      <div id="priceArea" style="display:none">
        <div class="sym-price" id="symPrice">--</div>
        <div class="sym-chg" id="symChg">--</div>
      </div>
      <div class="sym-meta" id="symMeta"></div>
    </div>

    <!-- Indicator controls -->
    <div class="ctrl-bar">
      <span class="ctrl-label">指標：</span>
      <button class="ind-toggle on-vol" id="tog-vol" onclick="toggleIndicator('vol')">📊 成交量</button>
      <button class="ind-toggle on-rsi" id="tog-rsi" onclick="toggleIndicator('rsi')">RSI(14)</button>
      <button class="ind-toggle on-macd" id="tog-macd" onclick="toggleIndicator('macd')">MACD</button>
      <div class="ctrl-sep"></div>
      <span class="ctrl-label" style="margin-left:0">均線：</span>
      <button class="ind-toggle on-vol" id="tog-ma20" onclick="toggleMA()" style="color:var(--yellow);border-color:var(--yellow);background:rgba(255,214,0,.08)">MA20/50</button>
      <div class="ctrl-sep"></div>
      <span id="dataSource" style="font-size:10px;color:var(--green);font-family:'Space Mono',monospace;margin-left:4px">✓ GitHub Pages 連線正常</span>

      <button class="external-btn" onclick="openOfficialChart()" title="前往官方網站查看">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
        全螢幕看盤
      </button>
    </div>

    <!-- TradingView Widget -->
    <div class="tv-wrap" id="tvWrap">
      <div class="tv-loading" id="tvLoading">
        <div class="spinner"></div>
        <div class="load-txt" id="loadTxt">載入圖表中...</div>
      </div>
      <div id="tv-dynamic-container" style="height:100%;width:100%;"></div>
    </div>
  </div>

  <!-- ═══ TICKER ═══ -->
  <div class="ticker-bar">
    <div class="ticker-inner" id="tickerEl">
      <span class="titem"><span style="color:var(--dim)">即時行情跑馬燈</span></span>
    </div>
  </div>

</div>

<!-- ═══ TOAST & MODAL ═══ -->
<div class="toast" id="toast"></div>
<div class="modal-bg" id="helpModal" onclick="if(event.target===this)hideHelp()">
  <div class="modal">
    <h3>📘 股票代號格式說明</h3>
    <p>系統已支援智能辨識，輸入代號後按 Enter 即可。</p>
    <table class="sym-table">
      <tr><th>市場</th><th>格式</th><th>範例</th></tr>
      <tr><td>美股</td><td>直接輸入</td><td>AAPL · NVDA · TSLA</td></tr>
      <tr><td>台股</td><td>純數字</td><td>2330 · 0050 · 2317</td></tr>
      <tr><td>加密貨幣</td><td>幣種+USDT</td><td>BTCUSDT</td></tr>
    </table>
    <button class="pill-btn" onclick="hideHelp()" style="margin-top:10px">關閉</button>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
//  核心邏輯 (支援 GitHub Pages 完美顯示台股 TWSE)
// ════════════════════════════════════════════════════════════════
const DEFAULT_WL = ['TWSE:2330','TWSE:2317','TWSE:0050','NASDAQ:AAPL','NASDAQ:NVDA'];

let watchlist  = JSON.parse(localStorage.getItem('sp_wl_v3') || 'null') || [...DEFAULT_WL];
let curSym     = watchlist[0];
let tvWidget   = null;

let activeStudies = { vol:true, rsi:true, macd:true };

// 智能轉換代碼 (確保台股使用 TWSE 標籤)
function toTVSymbol(raw) {
  const s = raw.trim().toUpperCase();
  if (s.includes(':')) return s;              
  if (/^\d{4}$/.test(s) || /^\d{4}[A-Z]{0,2}$/.test(s)) return 'TWSE:' + s; // 聰明判斷台股純數字
  return s;
}

function displaySym(tvSym) {
  if (!tvSym) return '';
  if (tvSym.startsWith('TWSE:'))  return tvSym.replace('TWSE:','');
  if (tvSym.startsWith('TPEX:'))  return tvSym.replace('TPEX:','');
  return tvSym.includes(':') ? tvSym.split(':')[1] : tvSym;
}

function buildWidget(symbol) {
  const loading = document.getElementById('tvLoading');
  loading.classList.remove('hidden');

  // 強制解鎖超時
  const failSafeTimeout = setTimeout(() => { loading.classList.add('hidden'); }, 2000);

  // 動態重建容器
  const wrap = document.getElementById('tvWrap');
  let oldWidget = document.getElementById('tv-dynamic-container');
  if (oldWidget) oldWidget.remove();
  
  const newContainer = document.createElement('div');
  newContainer.id = 'tv-dynamic-container';
  newContainer.style.width = '100%';
  newContainer.style.height = '100%';
  wrap.appendChild(newContainer);

  const studiesToLoad = ['MASimple@tv-basicstudies'];
  if (activeStudies.vol)  studiesToLoad.push('Volume@tv-basicstudies');
  if (activeStudies.rsi)  studiesToLoad.push('RSI@tv-basicstudies');
  if (activeStudies.macd) studiesToLoad.push('MACD@tv-basicstudies');

  try {
    tvWidget = new TradingView.widget({
      symbol:            symbol,
      interval:          'D',
      container_id:      'tv-dynamic-container',
      width:             '100%',
      height:            '100%',
      timezone:          'Asia/Taipei',
      theme:             'dark',
      style:             '1',
      locale:            'zh_TW',
      toolbar_bg:        '#0f1520',
      enable_publishing: false,
      hide_top_toolbar:  false,
      hide_legend:       false,
      save_image:        false,
      studies:           studiesToLoad,
      loading_screen: { backgroundColor:'#0a0e17', foregroundColor:'#00d4ff' },
      onready: () => {
        clearTimeout(failSafeTimeout);
        loading.classList.add('hidden');
      },
    });
  } catch(e) {
    console.error("TradingView 載入錯誤", e);
  }
  
  updateSymBar(symbol);
}

// ════════════════════════════════════════════════════════════════
//  UI 更新與互動
// ════════════════════════════════════════════════════════════════
function openOfficialChart() {
  window.open(`https://tw.tradingview.com/chart/?symbol=${curSym}`, '_blank');
}

const SYM_INFO = {
  'NASDAQ:AAPL': { name:'Apple Inc.', exch:'NASDAQ' },
  'NASDAQ:NVDA': { name:'NVIDIA', exch:'NASDAQ' },
  'TWSE:2330':   { name:'台積電', exch:'TWSE' },
  'TWSE:2317':   { name:'鴻海', exch:'TWSE' },
  'TWSE:0050':   { name:'元大台灣50', exch:'TWSE' }
};

function updateSymBar(tvSym) {
  const info = SYM_INFO[tvSym] || {};
  document.getElementById('symBig').textContent  = displaySym(tvSym);
  document.getElementById('symFull').textContent = (info.name || '') + ' ' + (tvSym.split(':')[0] || '');
  document.getElementById('symMeta').innerHTML = `
    <div class="sym-stat"><div class="sym-stat-l">伺服器</div><div class="sym-stat-v" style="color:var(--green)">Online</div></div>`;
}

function renderWatchlist() {
  document.getElementById('wlList').innerHTML = watchlist.map(tvSym => {
    const info = SYM_INFO[tvSym] || {};
    return `
      <div class="witem ${tvSym===curSym?'active':''}" onclick="selectSym('${tvSym}')">
        <div class="wi-row1">
          <span class="wi-sym">${displaySym(tvSym)}</span>
          <button class="wi-rm" onclick="rmSym('${tvSym}',event)" title="移除">✕</button>
        </div>
        <div class="wi-name">${info.name || tvSym.split(':')[0]}</div>
      </div>`;
  }).join('');
}

function updateTicker() {
  const items = ['AAPL Apple', 'NVDA NVIDIA', '2330 台積電', '0050 台灣50', '2317 鴻海', 'BTC Bitcoin'].map(txt => `
    <span class="titem">
      <span style="color:var(--accent)">${txt.split(' ')[0]}</span>
      <span style="color:var(--text)">${txt.split(' ')[1]}</span>
    </span>`).join('');
  document.getElementById('tickerEl').innerHTML = items + items + items;
}

function toggleIndicator(name) {
  activeStudies[name] = !activeStudies[name];
  const clsMap = { vol:'on-vol', rsi:'on-rsi', macd:'on-macd' };
  const btn = document.getElementById('tog-'+name);
  activeStudies[name] ? btn.classList.add(clsMap[name]) : btn.classList.remove(clsMap[name]);
  buildWidget(curSym);
}

function toggleMA() { toast(`已預設載入 MA20，您可於圖表左上方設定中修改週期。`, 'ok'); }

function selectSym(tvSym) {
  curSym = tvSym;
  renderWatchlist();
  buildWidget(tvSym);
}

function addFromSearch() {
  const inp = document.getElementById('searchInput');
  if (!inp.value.trim()) return;
  const tvSym = toTVSymbol(inp.value);
  if (!watchlist.includes(tvSym)) {
    watchlist.push(tvSym);
    saveWL();
    toast('✓ 已加入 ' + displaySym(tvSym));
  }
  inp.value = '';
  selectSym(tvSym);
}

function rmSym(tvSym, ev) {
  ev.stopPropagation();
  watchlist = watchlist.filter(s => s !== tvSym);
  saveWL();
  if (curSym === tvSym && watchlist.length) selectSym(watchlist[0]);
  renderWatchlist();
  toast('已移除', 'ng');
}

function clearAll() {
  if (!confirm('確定清空自選清單？')) return;
  watchlist = []; saveWL(); renderWatchlist();
}

function saveWL() { localStorage.setItem('sp_wl_v3', JSON.stringify(watchlist)); }

function toast(msg, t='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${t}`;
  setTimeout(()=>el.className='toast', 2500);
}

function showHelp() { document.getElementById('helpModal').classList.add('show'); }
function hideHelp() { document.getElementById('helpModal').classList.remove('show'); }
setInterval(() => {
